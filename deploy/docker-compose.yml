services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    ports:
      - "8080:8080"
    privileged: true
    volumes:
      - ./zigbee2mqtt:/app/data
      - /dev:/dev
    environment:
      - TZ=Asia/Taipei
    depends_on:
      - mosquitto
    restart: unless-stopped

  app:
    image: ghcr.io/sigma-snaken/sigma-button-controller:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - WIFI_AGENT_URL=http://host.docker.internal:8001
      - TZ=Asia/Taipei
    depends_on:
      - mosquitto
    restart: unless-stopped
